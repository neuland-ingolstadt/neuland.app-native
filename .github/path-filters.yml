# Central path filters for dorny/paths-filter (referenced across CI workflows)

web:
  - 'src/**'
  - '**/*.web.tsx'
  - 'app.config.json'
  - 'config/Dockerfile'
  - 'config/nginx.conf'
  - 'babel.config.js'
  - 'tsconfig.json'
  - 'package.json'
  - 'bun.lock'
  - 'patches/**'

android:
  - 'app.config.json'
  - 'config/plugins/**'
  - 'src/assets/android/**'
  - '**/*.android.tsx'
  - 'package.json'
  - 'bun.lock'
  - 'patches/**'

src:
  - 'src/**'

docker:
  - 'src/**'
  - '**/*.web.tsx'
  - 'app.config.json'
  - 'config/Dockerfile'
  - 'config/nginx.conf'
  - 'babel.config.js'
  - 'tsconfig.json'
  - 'package.json'
  - 'bun.lock'
  - 'patches/**'

code:
  - 'src/**'
  - 'app.config.json'
  - 'babel.config.js'
  - 'tsconfig.json'
  - 'biome.json'
  - 'package.json'
  - 'bun.lock'
  - 'patches/**'
  - 'config/codegen.yml'

dependencies:
  - 'package.json'
  - 'bun.lock'
  - 'patches/**'
  - 'app.config.json'
  - 'config/plugins/**'
  - '.bun-version'

playwright:
  - 'e2e/**'
  - 'playwright.config.ts'
  - 'config/ci/serve-web-export.sh'
  - 'config/ci/upload-playwright-screenshots.sh'
  - 'config/ci/write-playwright-comment.sh'

workflows:
  - '.github/workflows/**'
  - '.github/actions/**'
  - '.github/path-filters.yml'
  - '.bun-version'
  - 'stryker.conf.mjs'
  - 'config/check-mutation-score.ts'
