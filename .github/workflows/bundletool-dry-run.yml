name: Bundletool dry-run

on:
  pull_request:
    paths:
      - '.github/workflows/release.yml'
      - '.github/workflows/bundletool-dry-run.yml'
  workflow_dispatch:

jobs:
  dry-run:
    name: Plan AAB to APK conversion
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: zulu
          java-version: '17'

      - name: Create placeholder AAB
        run: touch neuland-next.aab

      - name: Plan bundletool conversion
        uses: roberteggl/bundletool-action@64713a9081adc6f5ea408a9c19917a3e23f9f287 # v1.0.0
        with:
          aab-file: neuland-next.aab
          sign: false
          dry-run: true
          verbose: true
