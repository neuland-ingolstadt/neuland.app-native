name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
      src: ${{ steps.detect.outputs.src }}
      dependencies: ${{ steps.detect.outputs.dependencies }}
      workflows: ${{ steps.detect.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect changes
        uses: ./.github/actions/detect-changes
        id: detect

  static-checks:
    name: Biome and TypeScript checks
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - uses: ./.github/actions/setup

      - name: Check for merge conflict markers
        run: bash config/check-merge-conflicts.sh

      - name: Run TypeScript checks
        run: bun tsc --noEmit

      - name: Run Biome check
        run: bun biome ci .

      - name: Check i18n
        run: bun i18n:check

      - name: Check changelog for app version
        run: bun changelog:check

  expo-doctor:
    name: Expo Doctor
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.dependencies == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - uses: ./.github/actions/setup

      - name: Run Expo Doctor
        run: bun doctor

  unit-tests:
    name: Unit tests
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup

      - name: Run unit tests with coverage
        run: bun run test:coverage -- --reporter=junit --reporter-outfile=./junit.xml

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: ${{ github.event_name == 'push' }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./junit.xml
          report_type: test_results
          fail_ci_if_error: ${{ github.event_name == 'push' }}
          token: ${{ secrets.CODECOV_TOKEN }}

  mutation-tests:
    name: Mutation tests
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup

      - name: Run mutation tests
        run: bun run test:mutation:ci

      - name: Check mutation score thresholds
        run: bun run test:mutation:check

      - name: Upload mutation report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
