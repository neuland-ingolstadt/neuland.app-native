name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  static-checks:
    name: Biome and TypeScript checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript checks
        run: bun tsc --noEmit

      - name: Run Biome check
        run: bun biome ci .

      - name: Check i18n completeness
        run: bun i18n:check
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: bun run test:coverage -- --reporter=junit --reporter-outfile=./junit.xml

      - name: Convert coverage to Cobertura
        run: |
          python3 -m pip install lcov_cobertura
          lcov_cobertura coverage/lcov.info -o coverage/cobertura.xml

      - name: Upload coverage to GitHub Code Quality
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1
        with:
          file: coverage/cobertura.xml
          language: JavaScript
          label: code-coverage/bun

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: ${{ github.event_name == 'push' }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: ./junit.xml
          fail_ci_if_error: ${{ github.event_name == 'push' }}
          token: ${{ secrets.CODECOV_TOKEN }}
