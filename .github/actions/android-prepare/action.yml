name: Prepare Android project
description: License bundle, Expo prebuild, JDK 17 with Gradle cache, and Android SDK
runs:
  using: composite
  steps:
    - name: Update license list
      shell: bash
      run: bun run licences:bundle

    - name: Generate native Android project
      shell: bash
      run: bun run prebuild:android

    - name: Set up JDK 17
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        distribution: zulu
        java-version: '17'
        cache: gradle
        cache-dependency-path: android/**/build.gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
