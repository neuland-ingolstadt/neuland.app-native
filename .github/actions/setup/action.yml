name: Setup Neuland project
description: Node 26, pinned Bun, and frozen lockfile install (run actions/checkout first)
inputs:
  ignore-scripts:
    description: Pass --ignore-scripts to bun install
    required: false
    default: 'false'
  no-bun-cache:
    description: Disable setup-bun dependency cache (needed when checking out multiple refs in one job)
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '26'

    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: .bun-version
        no-cache: ${{ inputs.no-bun-cache == 'true' }}

    - name: Install dependencies
      shell: bash
      run: |
        install_flags=(--frozen-lockfile)
        if [ "${{ inputs.ignore-scripts }}" = "true" ]; then
          install_flags+=(--ignore-scripts)
        fi
        bun install "${install_flags[@]}"
